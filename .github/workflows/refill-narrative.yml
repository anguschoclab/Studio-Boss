name: Autonomous Narrative Refill

on:
  schedule:
    # Every day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows manual trigger from Actions tab

jobs:
  refill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Narrative Refill
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Use ts-node to run the refiller script
          npx ts-node src/engine/services/refillArchive.ts

      - name: Commit and Push Changes
        run: |
          git config --global user.name "The Bard Bot"
          git config --global user.email "bard-bot@users.noreply.github.com"
          git add src/engine/data/narrative/archive.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(narrative): autonomous refill of archive.json [skip ci]" && git push)
