name: CI/CD Pipeline

on:
  pull_request:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: for i in 1 2 3 4 5; do bun install && break || sleep 15; done

      - name: Type Check
        run: bun run type-check || bunx tsc --noEmit

      - name: Lint
        run: bun run lint || bunx eslint . || true

      - name: Test
        run: bun test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: for i in 1 2 3 4 5; do bun install && break || sleep 15; done

      - name: Build
        run: bun run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
